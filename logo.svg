<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Circle Gradient: light blue (top-left) to dark blue/black (bottom-right) -->
    <linearGradient id="circle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BC1EC" />
      <stop offset="40%" stop-color="#0C7BB3" />
      <stop offset="80%" stop-color="#08355B" />
      <stop offset="100%" stop-color="#020813" />
    </linearGradient>

    <!-- Swoosh Gradient: light blue on the left to dark blue/navy on the right -->
    <linearGradient id="swoosh-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5BC1EC" />
      <stop offset="60%" stop-color="#0C7BB3" />
      <stop offset="100%" stop-color="#0B3A60" />
    </linearGradient>
  </defs>

  <!-- Outer Circle -->
  <circle cx="250" cy="250" r="235" stroke="url(#circle-grad)" stroke-width="10" fill="none" />

  <!-- Vehicle Silhouette / Cargo Swoosh -->
  <!-- Top Swoosh (Roofline and cabin shape) -->
  <path d="M 90,215 C 150,192 245,180 325,198 C 385,210 420,230 425,245 C 390,225 340,210 280,205 C 220,200 150,202 130,204 Z" fill="url(#swoosh-grad)" />

  <!-- Bottom Swoosh (Hood and front fender shape) -->
  <path d="M 90,215 C 120,208 170,200 215,212 C 235,218 245,225 248,228 C 230,228 190,220 150,218 C 110,218 90,215 90,215 Z" fill="url(#swoosh-grad)" />

  <!-- Brand Typography -->
  <!-- Main Brand Name: MOVANA -->
  <text x="250" y="345" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#0C7BB3" text-anchor="middle" letter-spacing="4">MOVANA</text>
</svg>
