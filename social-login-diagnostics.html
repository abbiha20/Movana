<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup OAuth Credentials - Movana</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --radius-lg: 16px;
      --radius-md: 10px;
      --color-accent: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      background: white;
      width: 100%;
      max-width: 480px;
      padding: 40px 32px;
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.08), 0 0 1px 1px rgba(15, 23, 42, 0.04);
      text-align: left;
    }

    .warning-icon {
      font-size: 32px;
      margin-bottom: 20px;
      color: #eab308;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      line-height: 1.3;
    }

    p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .variables-list {
      background-color: #f1f5f9;
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 24px;
      border: 1px solid var(--border-color);
    }

    .variable-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .variable-item:last-child {
      margin-bottom: 0;
    }

    .variable-name {
      font-family: monospace;
      font-weight: 700;
      color: #ef4444;
      font-size: 13px;
    }

    .variable-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    ol {
      margin-left: 20px;
      margin-bottom: 24px;
      font-size: 13.5px;
      color: #334155;
    }

    li {
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      background: var(--text-main);
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="warning-icon">⚠️</div>
    <h1 id="diag-title">OAuth Configuration Required</h1>
    <p id="diag-intro">Real authentication requires environment variables. To initiate third-party OAuth, you must configure the following key-value pairs in your project environment:</p>
    
    <div class="variables-list" id="missing-vars-container">
      <!-- Missing variables populated here -->
    </div>

    <h2 style="font-size: 15px; margin-bottom: 12px; font-weight: 700;">Configuration Steps:</h2>
    <ol id="diag-steps">
      <!-- Mapped to provider -->
    </ol>

    <a href="#" class="btn" onclick="window.close(); return false;">Close Diagnostics</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const provider = urlParams.get('provider') || 'google';
    const missing = (urlParams.get('missing') || '').split(',').filter(Boolean);

    // Setup title
    const providerLabel = provider === 'icloud' || provider === 'apple' ? 'iCloud / Apple' : 'Google';
    document.getElementById('diag-title').textContent = `${providerLabel} OAuth Setup Required`;

    // Populate missing variables
    const varsContainer = document.getElementById('missing-vars-container');
    const descriptions = {
      'GOOGLE_CLIENT_ID': 'Google Console -> APIs & Services -> Credentials -> OAuth 2.0 Client ID.',
      'GOOGLE_CLIENT_SECRET': 'Google Console -> APIs & Services -> Credentials -> Client Secret string.',
      'APPLE_CLIENT_ID': 'Apple Developer -> Certificates, Identifiers & Profiles -> Identifiers -> Services ID.',
      'APPLE_CLIENT_SECRET': 'Your private client secret key JWT signed with Apple Developer Credentials.'
    };

    missing.forEach(v => {
      const div = document.createElement('div');
      div.className = 'variable-item';
      div.innerHTML = `
        <span class="variable-name">${v}</span>
        <span class="variable-desc">${descriptions[v] || 'Required OAuth environment setting.'}</span>
      `;
      varsContainer.appendChild(div);
    });

    if (missing.length === 0) {
      varsContainer.innerHTML = '<span style="font-size: 13px; color: var(--text-muted);">No missing variables detected. Please check credentials values are correct.</span>';
    }

    // Steps rendering
    const stepsContainer = document.getElementById('diag-steps');
    if (provider === 'google') {
      stepsContainer.innerHTML = `
        <li>Create a Google Cloud Project in the <a href="https://console.cloud.google.com" target="_blank">Google Cloud Console</a>.</li>
        <li>Configure the <strong>OAuth Consent Screen</strong> and publish it.</li>
        <li>Go to <strong>Credentials</strong> -> <strong>Create Credentials</strong> -> <strong>OAuth client ID</strong> (Web Application).</li>
        <li>Add <code>http://localhost:3000/api/auth/callback</code> (and your Vercel domain callback) to the <strong>Authorized Redirect URIs</strong>.</li>
        <li>Set the generated Client ID and Client Secret in your local <code>.env</code> file or Vercel environment settings.</li>
      `;
    } else {
      stepsContainer.innerHTML = `
        <li>Go to the <a href="https://developer.apple.com" target="_blank">Apple Developer Portal</a>.</li>
        <li>Register an <strong>App ID</strong> and enable <strong>Sign in with Apple</strong>.</li>
        <li>Register a <strong>Services ID</strong>, select your App ID, and add your callback URL (e.g. <code>https://movana.vercel.app/api/auth/callback</code>) as an authorized return URI.</li>
        <li>Generate a Private Key (<code>.p8</code>) for Sign in with Apple and set the variables.</li>
      `;
    }
  </script>
</body>
</html>
